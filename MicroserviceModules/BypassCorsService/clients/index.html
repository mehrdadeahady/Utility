<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BypassCorsService Demo</title>
<meta name="viewport" content="width=device-width">
<style>
html, body {
  margin: 0;
  height: 100%;
  padding: 3px;
  font-family: Arial, sans-serif;
  font-size: 16px;
}
* { box-sizing: border-box; }
label { display: block; margin-top: 10px; }
input {
  display: block;
  width: 100%;
  padding: 8px 5px;
  border: 1px solid #CCC;
}
button {
  display: inline-block;
  width: 49%;
  padding: 8px;
  margin-top: 10px;
}
textarea {
  width: 100%;
  height: 100%;
}
#top {
  height: 180px;
  position: relative;
}
#bottom {
  height: 100%;
  margin-top: -180px;
  padding-top: 180px;
}
</style>
</head>
<body>

<div id="top">
  <strong>BypassCorsService Demo</strong>

  <label>
    URL to be fetched:
    <input type="url" id="url" placeholder="https://example.com/api">
  </label>

  <label>
    POST data:
    <input type="text" id="data" placeholder="key=value&foo=bar">
  </label>

  <label>
    <button id="get">GET</button>
    <button id="post">POST</button>
  </label>
</div>

<div id="bottom">
  <textarea id="output" placeholder="Response will appear here..."></textarea>
</div>

<script>
  var cors_api_url = 'http://localhost:8080/';

  function doCORSRequest(options, printResult) {
    var x = new XMLHttpRequest();
    x.open(options.method, cors_api_url + options.url);

    x.onload = x.onerror = function() {
      printResult(
        options.method + ' ' + options.url + '\n' +
        x.status + ' ' + x.statusText + '\n\n' +
        (x.responseText || '')
      );
    };

    if (/^POST/i.test(options.method)) {
      x.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    }

    x.send(options.data);
  }

  (function() {
    var urlField = document.getElementById('url');
    var dataField = document.getElementById('data');
    var outputField = document.getElementById('output');

    document.getElementById('get').onclick =
    document.getElementById('post').onclick = function(e) {
      e.preventDefault();

      doCORSRequest({
        method: this.id === 'post' ? 'POST' : 'GET',
        url: urlField.value,
        data: dataField.value
      }, function(result) {
        outputField.value = result;
      });
    };
  })();
</script>

</body>
</html>
